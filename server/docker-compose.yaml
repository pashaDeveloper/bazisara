services:
  server:
    image: node:20-bookworm-slim
    container_name: bazisara-server
    working_dir: /app
    env_file:
      - ./.env
    environment:
      NODE_ENV: development
      PORT: 8080
      MONGO_URI: mongodb://mongo:27017/bazisara
      DB_NAME: bazisara
      NEXT_PUBLIC_CLIENT_URL: http://localhost:3001
      NEXT_PUBLIC_DASHBOARD_URL: http://localhost:5173
    ports:
      - "8080:8080"
    volumes:
      - ./:/app
      - server_node_modules:/app/node_modules
      - server_uploads:/app/uploads
    command: sh -c "npm ci && npm run dev"
    depends_on:
      mongo:
        condition: service_healthy
    restart: unless-stopped

  mongo:
    image: mongo:7
    container_name: bazisara-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped

volumes:
  mongo_data:
  server_node_modules:
  server_uploads:
